name: Backend CI

on:
  push:
    paths:
      - 'FashionSwap-backend/**'
  pull_request:
    paths:
      - 'FashionSwap-backend/**'

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FashionSwap-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: FashionSwap-backend/package-lock.json

      - run: npm ci
      - run: npm run lint || true
      - run: npm run build
      - run: npm test -- --runInBand
      - run: npm audit --audit-level=high
