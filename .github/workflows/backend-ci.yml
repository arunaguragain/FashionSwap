name: Backend CI
on:
  push:
    paths: ['Aashwaas-backend/**']
  pull_request:
    paths: ['Aashwaas-backend/**']
jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Aashwaas-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npm audit --audit-level=high
