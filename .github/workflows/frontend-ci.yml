name: Frontend CI

on:
  push:
    paths:
      - 'FashionSwap-frontend/**'
  pull_request:
    paths:
      - 'FashionSwap-frontend/**'

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FashionSwap-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: FashionSwap-frontend/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm audit --audit-level=high
